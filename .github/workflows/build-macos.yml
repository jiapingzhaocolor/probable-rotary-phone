name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    name: Universal macOS build
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust and macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build files
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate macOS icons
        run: npm run icons

      - name: Build universal macOS DMG
        run: npm run build:mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: Shot-List-Maker-macOS-universal-DMG
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          compression-level: 0

      - name: Create GitHub Release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --title "Shot List Maker $GITHUB_REF_NAME" \
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
